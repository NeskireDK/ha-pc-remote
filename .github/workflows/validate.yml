name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install homeassistant ruff

      - name: Lint with Ruff
        run: ruff check custom_components/

      - name: Check manifest
        run: python -c "import json; m = json.load(open('custom_components/pc_remote/manifest.json')); assert m['domain'] == 'pc_remote'"

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-homeassistant-custom-component wakeonlan==3.1.0

      - name: Run tests with coverage
        run: pytest tests/ --cov=custom_components/pc_remote --cov-report=term-missing --cov-report=html:coverage-report --cov-report=xml:coverage.xml --junitxml=test-results.xml 2>&1 | tee test-output.txt

      - name: Test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results.xml

      - name: Coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          format: markdown
          output: both

      - name: Add coverage to PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: code-coverage-results.md

      - name: Extract badge metrics
        if: always()
        id: metrics
        run: |
          LINE_PCT=$(python -c "import xml.etree.ElementTree as ET; t=ET.parse('coverage.xml').getroot(); print(f'{float(t.get(\"line-rate\",0))*100:.1f}')")
          TEST_COUNT=$(grep -oP '(\d+) passed' test-output.txt | grep -oP '\d+' || echo "0")
          echo "line_pct=$LINE_PCT" >> $GITHUB_OUTPUT
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/

      - name: Generate badge JSON
        if: github.ref == 'refs/heads/main'
        run: |
          LINE_PCT=${{ steps.metrics.outputs.line_pct }}
          TEST_COUNT=${{ steps.metrics.outputs.test_count }}
          if (( $(echo "$LINE_PCT >= 80" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$LINE_PCT >= 60" | bc -l) )); then COLOR="green"
          elif (( $(echo "$LINE_PCT >= 40" | bc -l) )); then COLOR="yellow"
          else COLOR="red"; fi
          mkdir -p badges
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${LINE_PCT}%\",\"color\":\"${COLOR}\"}" > badges/coverage.json
          echo "{\"schemaVersion\":1,\"label\":\"tests\",\"message\":\"${TEST_COUNT} passed\",\"color\":\"brightgreen\"}" > badges/tests.json

      - name: Deploy badges to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          destination_dir: badges
          keep_files: true
