name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install homeassistant ruff

      - name: Lint with Ruff
        run: ruff check custom_components/

      - name: Check manifest
        run: python -c "import json; m = json.load(open('custom_components/windows_remote/manifest.json')); assert m['domain'] == 'windows_remote'"
