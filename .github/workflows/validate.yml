name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install homeassistant ruff

      - name: Lint with Ruff
        run: ruff check custom_components/

      - name: Check manifest
        run: python -c "import json; m = json.load(open('custom_components/pc_remote/manifest.json')); assert m['domain'] == 'pc_remote'"

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-homeassistant-custom-component

      - name: Run tests with coverage
        run: pytest tests/ --cov=custom_components/pc_remote --cov-report=term-missing --cov-report=html:coverage-report || true
        # || true because there may be no tests yet

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
